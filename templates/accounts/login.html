{% extends 'base.html' %}
{% block title %}Login — MARLO{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">M</div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your MARLO account</p>
    </div>

    <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" novalidate>
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-control"
          placeholder="you@example.com"
          value="{{ request.POST.email }}"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="Your password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
